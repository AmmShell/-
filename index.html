<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายงานผลการฝึกประสบการณ์วิชาชีพ</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-boundary" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap;"></div>
    <script>
      window.addEventListener('error', function(event) {
        document.getElementById('error-boundary').textContent += event.error?.stack || event.message + '\n';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-boundary').textContent += event.reason?.stack || event.reason + '\n';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
